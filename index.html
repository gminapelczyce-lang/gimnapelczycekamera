<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="System obserwacji ptaków w gminie Pełczyce. Wybierz kamerę i zobacz podgląd online z obszaru jeziora Stawno."
    />
    <link rel="icon" type="image/png" href="./logo.png" />
    <title>System obserwacji ptaków | Gmina Pełczyce</title>
    <style>
      :root {
        --bg: #f4f1e7;
        --bg-accent: #d8e2d1;
        --surface-strong: #ffffff;
        --text: #1f2520;
        --muted: #576158;
        --line: rgba(31, 37, 32, 0.12);
        --green-dark: #28573b;
        --shadow: 0 30px 70px rgba(31, 37, 32, 0.14);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        font-family: "Trebuchet MS", "Avenir Next", "Segoe UI", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(93, 138, 78, 0.2), transparent 28%),
          radial-gradient(circle at top right, rgba(183, 192, 142, 0.18), transparent 30%),
          linear-gradient(180deg, var(--bg-accent) 0%, var(--bg) 24%, #f8f5ec 100%);
      }

      .page {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .container {
        width: min(1120px, calc(100% - 36px));
        margin: 0 auto;
      }

      main {
        flex: 1;
        display: flex;
        align-items: flex-start;
        padding: 96px 0 28px;
      }

      .camera-card {
        position: relative;
        width: 100%;
        padding: 34px 28px 28px;
        background: var(--surface-strong);
        border: 1px solid rgba(31, 37, 32, 0.08);
        border-radius: 30px;
        box-shadow: var(--shadow);
      }

      .brand-mark {
        position: absolute;
        top: -28px;
        left: 42px;
        width: 112px;
        height: 129px;
        object-fit: contain;
        filter: drop-shadow(0 14px 24px rgba(31, 37, 32, 0.16));
      }

      .card-header {
        display: flex;
        align-items: flex-start;
        min-height: 88px;
        padding-left: 146px;
      }

      .camera-card h1 {
        margin: 0;
        font-size: clamp(2rem, 1.5rem + 1.45vw, 3rem);
        font-weight: 700;
        line-height: 1.08;
        letter-spacing: -0.03em;
      }

      .camera-intro {
        margin: 22px 0 0;
        color: var(--muted);
        font-size: 1rem;
        line-height: 1.6;
      }

      .camera-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 18px;
        margin-top: 26px;
      }

      .official-link-wrap {
        display: flex;
        justify-content: center;
        margin-top: 24px;
      }

      .official-link {
        color: var(--green-dark);
        font-weight: 700;
        text-decoration: none;
      }

      .official-link:hover,
      .official-link:focus-visible {
        text-decoration: underline;
      }

      .camera-link {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 170px;
        padding: 24px;
        border-radius: 24px;
        border: 1px solid rgba(40, 87, 59, 0.12);
        background: linear-gradient(145deg, #f9fbf5, #eaf1df);
        color: var(--green-dark);
        font-size: clamp(1.45rem, 1.05rem + 1vw, 2rem);
        font-weight: 700;
        text-decoration: none;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.65);
        transition: transform 180ms ease, box-shadow 180ms ease, border-color 180ms ease;
      }

      .camera-link:hover,
      .camera-link:focus-visible {
        transform: translateY(-3px);
        border-color: rgba(40, 87, 59, 0.24);
        box-shadow: 0 18px 30px rgba(40, 87, 59, 0.12);
      }

      footer {
        padding: 18px 0 24px;
      }

      .footer-bar {
        padding: 16px 22px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        color: var(--muted);
        background: rgba(255, 255, 255, 0.8);
        border: 1px solid var(--line);
        border-radius: 20px;
      }

      .footer-links {
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: 16px;
        width: 100%;
      }

      .footer-center {
        text-align: center;
        font-weight: 700;
      }

      .footer-links a:last-child {
        justify-self: end;
      }

      .footer-bar a {
        color: var(--green-dark);
        font-weight: 700;
        text-decoration: none;
      }

      .footer-bar a:hover,
      .footer-bar a:focus-visible {
        text-decoration: underline;
      }

      @media (max-width: 760px) {
        .footer-bar {
          align-items: stretch;
        }

        .footer-links {
          display: flex;
          flex-direction: column;
          align-items: flex-start;
        }

        .footer-links a:last-child {
          justify-self: auto;
        }

        .footer-center {
          text-align: left;
        }
        .container {
          width: min(100%, calc(100% - 24px));
        }

        main {
          padding-top: 74px;
        }

        .camera-card {
          padding: 20px;
          border-radius: 22px;
        }

        .brand-mark {
          position: static;
          width: 84px;
          height: 98px;
          margin-bottom: 10px;
        }

        .card-header {
          display: block;
          min-height: 0;
          padding-left: 0;
        }

        .camera-card h1 {
          font-size: clamp(1.7rem, 1.25rem + 2vw, 2.3rem);
        }

        .camera-grid {
          grid-template-columns: 1fr;
        }

        .camera-link {
          min-height: 128px;
          border-radius: 18px;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <main class="container">
        <section class="camera-card" aria-labelledby="cameras-title">
          <div class="card-header">
            <img class="brand-mark" src="./logo.png" alt="Herb Pelczyc" />
            <div>
              <h1 id="cameras-title">System obserwacji ptaków jezioro Stawno</h1>
              <p class="camera-intro">Wybierz kamerę, aby przejść do podglądu na żywo.</p>
            </div>
          </div>
          <div class="camera-grid">
            <a class="camera-link" href="./camera.html?camera=1">Kamera 1</a>
            <a class="camera-link" href="./camera.html?camera=2">Kamera 2</a>
            <a class="camera-link" href="./camera.html?camera=3">Kamera 3</a>
            <a class="camera-link" href="./camera.html?camera=4">Kamera 4</a>
          </div>
          <div class="official-link-wrap">
            <a class="official-link" href="https://pelczyce.pl/" target="_blank" rel="noreferrer">Oficjalna strona Gminy Pełczyce</a>
          </div>
        </section>
      </main>

      <footer class="container">
        <div class="footer-bar">
          <div class="footer-links">
            <a href="https://www.roto-tech.org/" target="_blank" rel="noreferrer">made by roto-tech</a>
            <div class="footer-center">&copy; 2026 Gmina Pełczyce</div>
            <a href="./privacy.html">Polityka prywatności</a>
          </div>
        </div>
      </footer>
    </div>
  </body>
</html>
